<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Animation Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "title title"
        "preview settings";
      gap: 16px;
      padding: 16px;
    }

    h1 {
      grid-area: title;
      font-size: 1.2rem;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.05em;
    }

    /* ── Preview area ── */
    #preview-area {
      grid-area: preview;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      overflow: hidden;
      min-width: 0;
    }

    #bg-selector {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.8rem;
      color: #888;
    }

    .bg-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .bg-swatch.active { border-color: #a78bfa; }

    #sprite-video {
      border-radius: 6px;
      object-fit: contain;
      display: block;
    }

    #playback-controls {
      display: flex;
      gap: 10px;
    }

    button {
      background: #2d2d4e;
      color: #e0e0e0;
      border: 1px solid #44446a;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3d3d6e; }
    button.primary {
      background: #5b21b6;
      border-color: #7c3aed;
    }
    button.primary:hover { background: #6d28d9; }

    /* ── Settings panel ── */
    #settings {
      grid-area: settings;
      background: #16213e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 16px 20px;
      width: 300px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
      align-content: start;
      overflow-y: auto;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      padding: 0;
      accent-color: #7c3aed;
      cursor: pointer;
    }

    .value-badge {
      min-width: 44px;
      text-align: right;
      font-size: 0.85rem;
      color: #a78bfa;
      font-variant-numeric: tabular-nums;
    }

    /* ── Animation selector ── */
    #anim-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .anim-btn {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      color: #aaa;
      font-size: 0.8rem;
      padding: 5px 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .anim-btn:hover { background: #1e1e3a; color: #e0e0e0; }
    .anim-btn.active {
      background: #2d1b69;
      border-color: #7c3aed;
      color: #e0e0e0;
    }

    /* ── Info bar ── */
    #info-bar {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<h1>Sprite Animation Preview</h1>

<div id="preview-area">
  <div id="bg-selector">
    <span>Background:</span>
    <div class="bg-swatch active" data-color="#0f0f1a" style="background:#0f0f1a" title="Dark"></div>
    <div class="bg-swatch" data-color="#1a1a1a" style="background:#1a1a1a" title="Black"></div>
    <div class="bg-swatch" data-color="#ffffff" style="background:#ffffff; border-color:#ccc" title="White"></div>
    <div class="bg-swatch" data-color="#4ade80" style="background:#4ade80" title="Green screen"></div>
    <div class="bg-swatch" data-color="transparent" style="background: repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 0 0 / 12px 12px" title="Transparent"></div>
  </div>

  <video id="sprite-video" loop muted playsinline autoplay></video>

  <div id="playback-controls">
    <button id="btn-play" class="primary">⏸ Pause</button>
    <button id="btn-reset">&#8635; Reset</button>
  </div>
  <div id="info-bar"><span id="time-display">0.0s / 0.0s</span></div>
</div>

<div id="settings">

  <!-- Animation selector -->
  <div class="field full">
    <label>Animation</label>
    <div id="anim-selector">
      <button class="anim-btn active" data-anim="idle">Idle</button>
      <button class="anim-btn" data-anim="explaining">Explaining</button>
      <button class="anim-btn" data-anim="greeting">Greeting</button>
    </div>
  </div>

  <!-- Speed -->
  <div class="field full">
    <label>Speed</label>
    <div class="input-row">
      <input type="range" id="speed" min="0.25" max="2" step="0.25" value="1">
      <span class="value-badge" id="speed-val">1×</span>
    </div>
  </div>

  <!-- Scale -->
  <div class="field full">
    <label>Scale</label>
    <div class="input-row">
      <input type="range" id="scale" min="0.05" max="1" step="0.05" value="0.3">
      <span class="value-badge" id="scale-val">0.3×</span>
    </div>
  </div>

</div>

<script>
  const ANIMS = {
    idle:       { src: 'video-animations/idle.mp4' },
    explaining: { src: 'video-animations/explaining.mp4' },
    greeting:   { src: 'video-animations/greeting.mp4' },
  };

  const video = document.getElementById('sprite-video');

  const FRAME_W = 1080;
  const FRAME_H = 1920;
  let scale = 0.3;

  function applyScale() {
    video.style.width  = (FRAME_W * scale) + 'px';
    video.style.height = (FRAME_H * scale) + 'px';
  }

  // ── Load animation ──────────────────────────────────────
  function loadAnim(key) {
    const a = ANIMS[key];
    if (!a) return;
    video.src = a.src;
    video.load();
    video.play();
  }

  // ── Init ────────────────────────────────────────────────
  applyScale();
  loadAnim('idle');

  // ── Time display ────────────────────────────────────────
  video.addEventListener('timeupdate', () => {
    const cur = video.currentTime.toFixed(1);
    const dur = isNaN(video.duration) ? '0.0' : video.duration.toFixed(1);
    document.getElementById('time-display').textContent = cur + 's / ' + dur + 's';
  });

  // ── Playback controls ───────────────────────────────────
  document.getElementById('btn-play').addEventListener('click', () => {
    if (video.paused) {
      video.play();
      document.getElementById('btn-play').textContent = '⏸ Pause';
    } else {
      video.pause();
      document.getElementById('btn-play').textContent = '▶ Play';
    }
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    video.currentTime = 0;
  });

  // ── Speed slider ────────────────────────────────────────
  document.getElementById('speed').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    video.playbackRate = v;
    document.getElementById('speed-val').textContent = v + '×';
  });

  // ── Scale slider ────────────────────────────────────────
  document.getElementById('scale').addEventListener('input', e => {
    scale = parseFloat(e.target.value);
    document.getElementById('scale-val').textContent = scale.toFixed(2).replace(/\.?0+$/, '') + '×';
    applyScale();
  });

  // ── Animation selector ──────────────────────────────────
  document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadAnim(btn.dataset.anim);
    });
  });

  // ── Background swatches ─────────────────────────────────
  const previewArea = document.getElementById('preview-area');
  document.querySelectorAll('.bg-swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      previewArea.style.background = s.dataset.color;
    });
  });
</script>
</body>
</html>
