<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Animation Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "title title"
        "preview settings";
      gap: 16px;
      padding: 16px;
    }

    h1 {
      grid-area: title;
      font-size: 1.2rem;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.05em;
    }

    /* ── Preview area ── */
    #preview-area {
      grid-area: preview;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      overflow: hidden;
      min-width: 0;
    }

    #bg-selector {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.8rem;
      color: #888;
    }

    .bg-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .bg-swatch.active { border-color: #a78bfa; }

    #sprite-canvas {
      image-rendering: auto;
      border-radius: 6px;
    }

    #playback-controls {
      display: flex;
      gap: 10px;
    }

    button {
      background: #2d2d4e;
      color: #e0e0e0;
      border: 1px solid #44446a;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3d3d6e; }
    button.primary {
      background: #5b21b6;
      border-color: #7c3aed;
    }
    button.primary:hover { background: #6d28d9; }

    /* ── Settings panel ── */
    #settings {
      grid-area: settings;
      background: #16213e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 16px 20px;
      width: 300px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
      align-content: start;
      overflow-y: auto;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"], input[type="range"] {
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 5px 8px;
      width: 80px;
    }

    input[type="range"] {
      width: 100%;
      padding: 0;
      accent-color: #7c3aed;
      cursor: pointer;
    }

    .value-badge {
      min-width: 44px;
      text-align: right;
      font-size: 0.85rem;
      color: #a78bfa;
      font-variant-numeric: tabular-nums;
    }

    /* ── Animation selector ── */
    #anim-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .anim-btn {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      color: #aaa;
      font-size: 0.8rem;
      padding: 5px 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .anim-btn:hover { background: #1e1e3a; color: #e0e0e0; }
    .anim-btn.active {
      background: #2d1b69;
      border-color: #7c3aed;
      color: #e0e0e0;
    }

    /* ── Frame range ── */
    #frame-range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    #frame-range-row input[type="number"] { width: 64px; }

    /* ── Info bar ── */
    #info-bar {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<h1>Sprite Animation Preview</h1>

<div id="preview-area">
  <div id="bg-selector">
    <span>Background:</span>
    <div class="bg-swatch active" data-color="#0f0f1a" style="background:#0f0f1a" title="Dark"></div>
    <div class="bg-swatch" data-color="#1a1a1a" style="background:#1a1a1a" title="Black"></div>
    <div class="bg-swatch" data-color="#ffffff" style="background:#ffffff; border-color:#ccc" title="White"></div>
    <div class="bg-swatch" data-color="#4ade80" style="background:#4ade80" title="Green screen"></div>
    <div class="bg-swatch" data-color="transparent" style="background: repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 0 0 / 12px 12px" title="Transparent"></div>
  </div>

  <canvas id="sprite-canvas"></canvas>

  <div id="playback-controls">
    <button id="btn-play" class="primary">⏸ Pause</button>
    <button id="btn-prev">&#9664; Prev</button>
    <button id="btn-next">Next &#9654;</button>
    <button id="btn-reset">&#8635; Reset</button>
  </div>
  <div id="info-bar">Frame <span id="frame-counter">0</span> / <span id="frame-total">85</span></div>
</div>

<div id="settings">

  <!-- Animation selector -->
  <div class="field full">
    <label>Animation</label>
    <div id="anim-selector">
      <button class="anim-btn active" data-anim="idle">Idle</button>
      <button class="anim-btn" data-anim="explaining">Explaining</button>
      <button class="anim-btn" data-anim="greeting">Greeting</button>
    </div>
  </div>

  <!-- Frame size -->
  <div class="field">
    <label>Frame Width (px)</label>
    <input type="number" id="frameW" value="1080" min="1">
  </div>
  <div class="field">
    <label>Frame Height (px)</label>
    <input type="number" id="frameH" value="1920" min="1">
  </div>

  <!-- Grid -->
  <div class="field">
    <label>Columns</label>
    <input type="number" id="cols" value="10" min="1">
  </div>
  <div class="field">
    <label>Total Frames</label>
    <input type="number" id="totalFrames" value="86" min="1">
  </div>

  <!-- Frame range -->
  <div class="field full">
    <label>Frame Range (start – end)</label>
    <div id="frame-range-row">
      <input type="number" id="rangeStart" value="0" min="0">
      <span>–</span>
      <input type="number" id="rangeEnd" value="66" min="0">
      <button id="btn-use-all" style="padding:4px 10px;font-size:0.78rem">Use all</button>
    </div>
  </div>

  <!-- FPS -->
  <div class="field full">
    <label>Speed (FPS)</label>
    <div class="input-row">
      <input type="range" id="fps" min="1" max="60" value="30">
      <span class="value-badge" id="fps-val">30 fps</span>
    </div>
  </div>

  <!-- Scale -->
  <div class="field full">
    <label>Scale</label>
    <div class="input-row">
      <input type="range" id="scale" min="0.05" max="1" step="0.05" value="0.3">
      <span class="value-badge" id="scale-val">0.3×</span>
    </div>
  </div>

</div>


<script>
  const ANIMS = {
    idle:     { src: 'idle-spritesheet.png',     frameW: 1080, frameH: 1920, cols: 10, totalFrames: 86, rangeStart: 0, rangeEnd: 66 },
    explaining: { src: 'explaining-spritesheet.png', frameW: 1080, frameH: 1920, cols: 9,  totalFrames: 75, rangeStart: 0, rangeEnd: 74 },
    greeting:   { src: 'greeting-spritesheet.png',   frameW: 1080, frameH: 1920, cols: 10, totalFrames: 93, rangeStart: 0, rangeEnd: 92 },
  };

  const canvas  = document.getElementById('sprite-canvas');
  const ctx     = canvas.getContext('2d');
  const img     = new Image();

  // Settings
  let frameW      = 1080;
  let frameH      = 1920;
  let cols        = 10;
  let totalFrames = 86;
  let rangeStart  = 0;
  let rangeEnd    = 66;
  let fps         = 30;
  let scale       = 0.3;

  // State
  let currentFrame = rangeStart;
  let playing      = true;
  let lastTime     = 0;
  let rafId        = null;

  // ── Image load ──────────────────────────────────────────
  img.onload = () => {
    applySettings();
    requestAnimationFrame(loop);
  };
  img.onerror = () => {
    ctx.fillStyle = '#ff4444';
    ctx.font = '14px sans-serif';
    ctx.fillText('Could not load sprite sheet.', 8, 20);
  };
  img.src = ANIMS.idle.src;

  // ── Animation loop ──────────────────────────────────────
  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (!playing) return;
    const interval = 1000 / fps;
    if (ts - lastTime < interval) return;
    lastTime = ts;
    advance();
  }

  function advance() {
    currentFrame++;
    if (currentFrame > rangeEnd) currentFrame = rangeStart;
    drawFrame();
  }

  function drawFrame() {
    const col = currentFrame % cols;
    const row = Math.floor(currentFrame / cols);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(
      img,
      col * frameW, row * frameH, frameW, frameH,
      0, 0, frameW, frameH
    );
    document.getElementById('frame-counter').textContent = currentFrame;
  }

  // ── Settings apply ──────────────────────────────────────
  function applySettings() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = frameW * dpr;
    canvas.height = frameH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    canvas.style.width  = (frameW * scale) + 'px';
    canvas.style.height = (frameH * scale) + 'px';
    currentFrame  = Math.max(rangeStart, Math.min(currentFrame, rangeEnd));
    document.getElementById('frame-total').textContent = rangeEnd;
    drawFrame();
  }

  // ── Controls ────────────────────────────────────────────
  document.getElementById('btn-play').addEventListener('click', () => {
    playing = !playing;
    document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
  });

  document.getElementById('btn-prev').addEventListener('click', () => {
    playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    currentFrame--;
    if (currentFrame < rangeStart) currentFrame = rangeEnd;
    drawFrame();
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    currentFrame++;
    if (currentFrame > rangeEnd) currentFrame = rangeStart;
    drawFrame();
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    currentFrame = rangeStart;
    drawFrame();
  });

  // ── Numeric inputs ──────────────────────────────────────
  function bindNumber(id, setter) {
    document.getElementById(id).addEventListener('change', e => {
      const v = parseInt(e.target.value, 10);
      if (!isNaN(v) && v > 0) { setter(v); applySettings(); }
    });
  }

  bindNumber('frameW',      v => { frameW      = v; });
  bindNumber('frameH',      v => { frameH      = v; });
  bindNumber('cols',        v => { cols        = v; });
  bindNumber('totalFrames', v => {
    totalFrames = v;
    const re = document.getElementById('rangeEnd');
    rangeEnd = v - 1;
    re.value = rangeEnd;
  });

  document.getElementById('rangeStart').addEventListener('change', e => {
    const v = parseInt(e.target.value, 10);
    if (!isNaN(v) && v >= 0) { rangeStart = v; applySettings(); }
  });
  document.getElementById('rangeEnd').addEventListener('change', e => {
    const v = parseInt(e.target.value, 10);
    if (!isNaN(v) && v >= 0) { rangeEnd = v; applySettings(); }
  });

  document.getElementById('btn-use-all').addEventListener('click', () => {
    rangeStart = 0;
    rangeEnd   = totalFrames - 1;
    document.getElementById('rangeStart').value = 0;
    document.getElementById('rangeEnd').value   = rangeEnd;
    applySettings();
  });

  // ── Range sliders ───────────────────────────────────────
  const fpsSlider = document.getElementById('fps');
  fpsSlider.addEventListener('input', () => {
    fps = parseInt(fpsSlider.value, 10);
    document.getElementById('fps-val').textContent = fps + ' fps';
  });

  const scaleSlider = document.getElementById('scale');
  scaleSlider.addEventListener('input', () => {
    scale = parseFloat(scaleSlider.value);
    document.getElementById('scale-val').textContent = scale.toFixed(2).replace(/\.?0+$/, '') + '×';
    applySettings();
  });

  // ── Animation selector ─────────────────────────────────
  function loadAnim(key) {
    const a = ANIMS[key];
    if (!a) return;
    frameW      = a.frameW;
    frameH      = a.frameH;
    cols        = a.cols;
    totalFrames = a.totalFrames;
    rangeStart  = a.rangeStart;
    rangeEnd    = a.rangeEnd;
    currentFrame = rangeStart;

    // Sync inputs
    document.getElementById('frameW').value      = frameW;
    document.getElementById('frameH').value      = frameH;
    document.getElementById('cols').value        = cols;
    document.getElementById('totalFrames').value = totalFrames;
    document.getElementById('rangeStart').value  = rangeStart;
    document.getElementById('rangeEnd').value    = rangeEnd;

    img.src = a.src;  // triggers img.onload → applySettings
  }

  document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadAnim(btn.dataset.anim);
    });
  });

  // ── Background swatches ─────────────────────────────────
  const swatches = document.querySelectorAll('.bg-swatch');
  const previewArea = document.getElementById('preview-area');
  swatches.forEach(s => {
    s.addEventListener('click', () => {
      swatches.forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      previewArea.style.background = s.dataset.color;
    });
  });
</script>
</body>
</html>
